services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent@sha256:855e5f4805ac218f406a5ae989a62a77e03f7e5f70128335b7970550a58c96e1
    container_name: qbittorrent
    restart: unless-stopped
    networks:
      caddy:
      internet:
    depends_on:
      caddy:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    environment:
      PUID: ${DOCKER_USER_ID:-1000}
      PGID: ${DOCKER_GROUP_ID:-1000}
      TZ: UTC
      WEBUI_PORT: 8080
    volumes:
      - qbittorrent_config:/config
      - qbittorrent_data:/downloads
      - ./configs/qbittorrent/init:/custom-cont-init.d:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
