---
schemaVersion: 1
module: "qbittorrent"
target: "apps"
services:
  qbittorrent:
    image: "lscr.io/linuxserver/qbittorrent@sha256:855e5f4805ac218f406a5ae989a62a77e03f7e5f70128335b7970550a58c96e1"
    containerName: "qbittorrent"
    lifecycle: "daemon"
    updatePolicy: "pinned"
    placement: "rootful"
    dependencies:
      caddy: "started"
      volume-init: "completed"
    environment:
      PUID: "${CONTAINER_USER_ID:-1000}"
      PGID: "${CONTAINER_GROUP_ID:-1000}"
      TZ: "UTC"
      WEBUI_PORT: 8080
    networks:
      caddy: null
      internet: null
    volumes:
    - "qbittorrent_config:/config"
    - "qbittorrent_data:/downloads"
    - "./configs/qbittorrent/init:/custom-cont-init.d:ro"
    health:
      test:
      - "CMD"
      - "wget"
      - "--quiet"
      - "--tries=1"
      - "--spider"
      - "http://localhost:8080/"
      interval: "60s"
      timeout: "10s"
      retries: 3
      start_period: "30s"
    restart: "unless-stopped"
networks: {}
volumes:
  qbittorrent_data:
    hostPath: "${QBITTORRENT_DATA_ROOT}"
    rootlessStrategy: "shared"
